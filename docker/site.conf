server {
	listen 8080 default_server;
	listen [::]:8080 default_server;

	root /usr/share/nginx/html;
	index index.html;
	charset utf-8;
	etag on;

	location = /_healthz {
		access_log off;
		default_type text/plain;
		add_header Cache-Control "no-store" always;
		return 200 "ok\n";
	}

	# Preserve Ghost's feed URL while serving Astro's generated feed file.
	location = /rss {
		return 301 /rss.xml;
	}

	location = /rss/ {
		return 301 /rss.xml;
	}

	location ~ ^/(tag|author)/([^/]+)/rss/?$ {
		return 301 /$1/$2/rss.xml;
	}

	# Ghost AMP URLs were one level below a root post slug.
	location ~ ^/([^/]+)/amp/?$ {
		return 301 /$1/;
	}

	# Astro fingerprints these files, so they can be cached indefinitely.
	location ^~ /_astro/ {
		access_log off;
		add_header Cache-Control "public, max-age=31536000, immutable" always;
		try_files $uri =404;
	}

	# In local previews this path is the read-only Ghost asset bind mount.
	location ^~ /content/ {
		access_log off;
		# Ghost has three extensionless bookmark thumbnails; all are PNGs.
		default_type image/png;
		add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400" always;
		try_files $uri =404;
	}

	location ~* \.(?:avif|css|gif|ico|jpe?g|js|mjs|png|svg|webp|woff2?)$ {
		access_log off;
		add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
		try_files $uri =404;
	}

	location ~* \.(?:json|xml)$ {
		add_header Cache-Control "public, max-age=300, must-revalidate" always;
		try_files $uri =404;
	}

	error_page 404 /404.html;

	location = /404.html {
		internal;
		add_header Cache-Control "public, max-age=0, must-revalidate" always;
	}

	# `$uri/` lets nginx issue the canonical trailing-slash redirect for
	# generated route directories; `$uri.html` supports standalone static files.
	location / {
		add_header Cache-Control "public, max-age=0, must-revalidate" always;
		try_files $uri $uri/ $uri.html =404;
	}
}
