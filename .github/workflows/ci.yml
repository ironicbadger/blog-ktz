name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run content:verify
      - run: npm run assets:registry:verify
      - run: npm run build
        env:
          PUBLIC_ASSET_BASE_URL: https://pub-430e0c9ecb66464fa6999cd23a749d13.r2.dev

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_ASSET_BASE_URL: https://pub-430e0c9ecb66464fa6999cd23a749d13.r2.dev
      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm run deploy:pages
      - name: Explain skipped deployment
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: echo "Build passed; add the CLOUDFLARE_API_TOKEN repository secret to enable automatic Pages deployment."
