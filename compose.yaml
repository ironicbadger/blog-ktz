name: ktz-blog

services:
  tools:
    profiles: [tools]
    build:
      context: .
      target: tooling
    image: ktz-blog-tools:local
    init: true
    working_dir: /workspace
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      HOME: /home/tooling
      XDG_CONFIG_HOME: /config
      TZ: America/New_York
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:-}"
    ports:
      - "127.0.0.1:${DEV_PORT:-4321}:4321"
      - "127.0.0.1:8976:8976"
    volumes:
      - type: bind
        source: .
        target: /workspace
      - tooling-home:/home/tooling
      - tooling-config:/config
      - tooling-node-modules:/workspace/node_modules
      - tooling-dist:/workspace/dist
      - tooling-astro:/workspace/.astro

  site:
    build:
      context: .
      args:
        PUBLIC_ASSET_BASE_URL: "${PUBLIC_ASSET_BASE_URL:-}"
    image: ktz-blog:local
    init: true
    ports:
      - "127.0.0.1:${BLOG_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    volumes:
      - type: bind
        source: ./assets-local/content
        target: /usr/share/nginx/html/content
        read_only: true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/_healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true

volumes:
  tooling-home:
  tooling-config:
  tooling-node-modules:
  tooling-dist:
  tooling-astro:
